# Security headers compartilhados — incluído pelo nginx.conf no server
# block E em CADA location que tenha seu próprio add_header.
#
# Por que duplicar? Nginx footgun classico: add_header em location bloco
# NAO herda os add_header do server block. Os 3 locations de assets
# estaticos (/static/, /media/, /_next/static/) tem add_header proprio
# pra Cache-Control, entao perderiam todos os headers de seguranca se
# nao incluissem este snippet.
#
# Atualizar AQUI propaga pra todos os call sites.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;
add_header Content-Security-Policy $nexus_security_csp always;
add_header X-XSS-Protection "1; mode=block" always;
