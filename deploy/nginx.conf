user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;

  # Hide nginx version
  server_tokens off;

  # Use Docker's internal DNS so we can reference services by name.
  resolver 127.0.0.11 valid=30s;

  upstream nexus_backend {
    server backend:8000;
    keepalive 16;
  }

  upstream nexus_frontend {
    server frontend:3000;
    keepalive 16;
  }

  log_format json_combined escape=json
    '{ "ts":"$time_iso8601", "remote":"$remote_addr", "method":"$request_method", '
    '"path":"$request_uri", "status":$status, "bytes":$body_bytes_sent, '
    '"ua":"$http_user_agent", "rt":$request_time }';
  access_log /var/log/nginx/access.log json_combined;

  # ---------------------------------------------------------------------
  # Headers globais de segurança (aplicados em TODAS as respostas HTTP).
  #
  # Cobrem rotas Next.js, Django admin e DRF browsable indistintamente.
  # Django ja envia HSTS/X-Frame/X-Content-Type-Options pra /api/ e /admin/,
  # mas o Next.js nao seta nada — esses add_header completam o conjunto.
  #
  # CSP propositalmente liberal pra `script-src 'self' 'unsafe-inline'`:
  # Next.js inlina scripts de hidratacao por design. Tightening pra nonce
  # exigiria configuracao especifica no Next.
  # ---------------------------------------------------------------------
  map $sent_http_content_type $nexus_security_csp {
    # CSP só pra HTML pages — nao pra imagens/JSON/etc
    # challenges.cloudflare.com liberado em script-src e frame-src pra
    # carregar o widget Turnstile (login/register).
    ~text/html "default-src 'self'; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; font-src 'self' data:; connect-src 'self' https:; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
    default "";
  }

  server {
    listen 80 default_server;
    server_name _;

    # X-Forwarded-For confiavel apenas quando vier do cloudflared local
    # (que conecta via 127.0.0.1) ou da rede docker bridge interna.
    # Quem bater direto na porta 8400 NAO consegue spoofar IP.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1/32;
    set_real_ip_from 172.16.0.0/12;   # Docker default bridges (172.17–172.31)
    set_real_ip_from 10.0.0.0/8;      # LAN privada
    real_ip_recursive on;

    # Headers de seguranca aplicados em TODAS as respostas (always).
    # NOTA: O snippet PRECISA ser re-incluido em cada location que tenha
    # seu proprio add_header — nginx nao herda add_header de servidor pra
    # location quando o location define os seus. Vide L6 do pentest.
    include /etc/nginx/security_headers.conf;

    # ---- Backend API ----
    location /api/ {
      proxy_pass http://nexus_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_buffering off;
      proxy_read_timeout 60s;
    }

    # ---- Django admin ----
    location /admin/ {
      proxy_pass http://nexus_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ---- Static files for Django admin ----
    location /static/ {
      alias /srv/static/;
      access_log off;
      expires 30d;
      include /etc/nginx/security_headers.conf;
      add_header Cache-Control "public, immutable";
    }

    # ---- Mirrored covers + chapter pages ----
    location /media/ {
      alias /srv/media/;
      access_log off;
      expires 7d;
      include /etc/nginx/security_headers.conf;
      add_header Cache-Control "public, immutable";
    }

    # ---- Next.js static assets ----
    location /_next/static/ {
      proxy_pass http://nexus_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_cache_valid 200 30d;
      expires 30d;
      include /etc/nginx/security_headers.conf;
      add_header Cache-Control "public, immutable";
    }

    # ---- Service Worker e manifest do PWA ----
    # Cache curto: navegador checa toda hora se ha SW novo. Se grudar
    # uma versao antiga, usuario fica sem updates ate forcar refresh.
    # Scope-Allowed-For evita reclamacao do browser quando o SW serve no /.
    location = /sw.js {
      proxy_pass http://nexus_frontend;
      proxy_set_header Host $host;
      include /etc/nginx/security_headers.conf;
      add_header Cache-Control "public, max-age=0, must-revalidate";
      add_header Service-Worker-Allowed "/";
    }
    location = /manifest.webmanifest {
      proxy_pass http://nexus_frontend;
      proxy_set_header Host $host;
      include /etc/nginx/security_headers.conf;
      add_header Cache-Control "public, max-age=3600";
    }

    # ---- Next.js everything else ----
    location / {
      proxy_pass http://nexus_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
