services:
  # --- Serviço Backend (Django) ---
  backend:
    build: ./backend
    container_name: arasaka-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # --- Serviço Frontend (Next.js) ---
  frontend:
    build: ./frontend
    container_name: arasaka-frontend
    # Garante que o modo de desenvolvimento (com hot reload) está ativo
    command: npm run dev 
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next  # <--- Importante: Isola a pasta de build para evitar erros de permissão
    ports:
      - "3000:3000"
    environment:
      # --- O SEGREDO DO HOT RELOAD NO WINDOWS ---
      - WATCHPACK_POLLING=true      # Força o Webpack a verificar mudanças
      - CHOKIDAR_USEPOLLING=true    # Força o Next.js a verificar mudanças
    depends_on:
      - backend

  # --- Serviço Banco de Dados (Postgres) ---
  db:
    image: postgres:15-alpine
    container_name: arasaka-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

volumes:
  postgres_data: