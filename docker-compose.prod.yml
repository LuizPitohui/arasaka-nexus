# Arasaka Nexus — produção
# - Postgres é externo (cluster global postgres-global na rede pgnet)
# - Único entrypoint público: nginx em ${NEXUS_HTTP_PORT:-8400}
#   → Cloudflare aponta `nexus.arasaka.fun *` para http://localhost:8400
# - Volume "media" compartilhado entre backend/worker/nginx pra servir
#   covers e chapter_pages mirrorados
#
# Pré-requisitos no host:
#   - Container postgres-global rodando, com DB e user provisionados
#     (ver deploy/DEPLOY.md)
#   - Rede docker que conecta este compose ao postgres-global
#     (default: postgres-global_default; ajuste em POSTGRES_NETWORK)
#   - .env.prod preenchido (ver .env.prod.example)

services:
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 60
               --access-logfile -"
    env_file: .env.prod
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - pg

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.prod
    volumes:
      - media:/app/media
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - default
      - pg

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    env_file: .env.prod
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - default
      - pg

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nexus.arasaka.fun/api}
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-8400}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - media:/srv/media:ro
      - static:/srv/static:ro
    depends_on:
      - frontend
      - backend

volumes:
  media:
  static:

networks:
  default:
    name: nexus-net
  pg:
    external: true
    name: ${POSTGRES_NETWORK:-postgres-global_default}
