# Arasaka Nexus — produção
# - Postgres é externo (cluster global postgres-global). O backend conecta
#   via DB_HOST=<docker-bridge-ip>:5432 (mesmo padrão de gac-connect e
#   sentinela). Não precisamos juntar redes — cada stack fica isolado.
# - Único entrypoint público: nginx em ${NEXUS_HTTP_PORT:-8400}
#   → Cloudflare aponta `nexus.arasaka.fun *` para http://localhost:8400
# - Volume "media" compartilhado entre backend/worker/nginx pra servir
#   covers e chapter_pages mirrorados
#
# Pré-requisitos no host:
#   - Container postgres-global rodando, com DB/user provisionados
#     (ver deploy/DEPLOY.md)
#   - .env.prod preenchido com DB_HOST = IP do bridge do postgres
#     (descobrir com: docker inspect postgres-global -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')

services:
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile -"
    env_file: .env.prod
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.prod
    volumes:
      - media:/app/media
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexus-beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    env_file: .env.prod
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nexus.arasaka.fun/api}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    container_name: nexus-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-8400}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/security_headers.conf:/etc/nginx/security_headers.conf:ro
      - media:/srv/media:ro
      - static:/srv/static:ro
    depends_on:
      - frontend
      - backend

  # FlareSolverr — proxy headless Chrome para passar Cloudflare IUAM e
  # outros JS challenges. Opt-in: NÃO sobe com `up -d` simples; precisa
  # explicitar o profile pra ativar:
  #
  #     docker compose -f docker-compose.prod.yml --profile antibot up -d
  #
  # Quando o container está vivo, basta setar no .env.prod:
  #     FLARESOLVERR_URL=http://flaresolverr:8191/v1
  # e dar restart no `backend` + `celery` pra o BaseHTTPClient começar a
  # rotear as fontes opt-in (USE_FLARESOLVERR=True na subclasse).
  #
  # Custo: ~2GB RAM em idle, +1.5-3s na primeira request por origem.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
    container_name: nexus-flaresolverr
    restart: unless-stopped
    profiles: ["antibot"]
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: America/Sao_Paulo
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8191/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Suwayomi-Server — roda extensões Mihon nativamente e expõe API REST.
  # A gente delega todas as buscas externas pra ele. Auto-atualiza
  # extensões seguindo o ritmo da comunidade Mihon. Opt-in:
  #
  #     docker compose -f docker-compose.prod.yml --profile mihon up -d
  #
  # Quando ativo, no .env.prod:
  #     SUWAYOMI_URL=http://suwayomi:4567
  #     SOURCES_ENABLED=mangadex,mangaplus,mihon
  # e restart backend + celery.
  #
  # Volume `suwayomi` persiste extensões instaladas + configurações.
  # Custo: ~1GB RAM, +500MB de imagem.
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:stable
    container_name: nexus-suwayomi
    restart: unless-stopped
    profiles: ["mihon"]
    environment:
      TZ: America/Sao_Paulo
      BIND_IP: 0.0.0.0
      BIND_PORT: "4567"
      # Sem auth no endpoint interno — só backend/worker conversam com ele
      # dentro da network nexus-net (não exposto publicamente).
      AUTH_MODE: none
    volumes:
      - suwayomi:/home/suwayomi/.local/share/Tachidesk
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4567/api/v1/settings || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  media:
  static:
  suwayomi:

networks:
  default:
    name: nexus-net
